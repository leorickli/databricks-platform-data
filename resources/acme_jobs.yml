resources:
  jobs:
    acme_ampcore_batch_job:
      name: acme ampcore batch job
      description: >-
        Batch pipeline for AMPCORE SCU200 CurrentSensor data (ACME):

        0. b00_pause_controller: Checks if job should be paused based on client-defined date ranges.

        1. ampcore_data_api2land: Fetches 30-second timeseries from the AMPCORE SCU200 REST API
           and writes raw JSON envelopes to the ampcore_batch landing volume.

        2. ampcore_metadata_api2land: Fetches the daily metadata snapshot (gateway info +
           CurrentSensor array) and writes to the landing volume. Runs after ampcore_data_api2land
           to avoid overwhelming the AMPCORE SCU200 gateway with concurrent requests.

        3. ampcore_pipeline: LDP pipeline (acme_ampcore_pipeline). Materialises bronze, silver, and gold
           tables from the landing volume. Depends on both api2land tasks completing.

        4. b10_connection_status: Shared task. Reads connection_config rows for connector=ampcore_api,
           executes the createViewSQL from otherMetadata (aggregates f_ampcore_econnection_measurements to 15-min
           buckets into a session-local TEMP VIEW), then queries per sensor and appends a
           status record to metadata.connection_status.  Runs serverless — no shared cluster.
           Static connection_config rows are seeded once via
           src/connectors/ampcore/batch/ampcore_connection_config.py.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: "0 0 10 * * ?"
        timezone_id: Europe/Amsterdam
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        # b00, ampcore_data_api2land, and ampcore_metadata_api2land run on serverless compute.
        # The AMPCORE SCU200 gateway is only reachable from the Databricks serverless network
        # plane; classic job cluster outbound IPs are blocked by the device/firewall.
        - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/shared/b00_pause_controller.py
            base_parameters:
              job_name: ampcore
              catalog_name: ${var.acme_catalog}
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: ampcore_data_api2land
          depends_on:
            - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/connectors/ampcore/batch/ampcore_data_api2land.py
            source: WORKSPACE
          environment_key: serverless-env
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          timeout_seconds: 3600

        - task_key: ampcore_metadata_api2land
          depends_on:
            - task_key: ampcore_data_api2land
          notebook_task:
            notebook_path: ../src/connectors/ampcore/batch/ampcore_metadata_api2land.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: ampcore_pipeline
          depends_on:
            - task_key: ampcore_data_api2land
            - task_key: ampcore_metadata_api2land
          pipeline_task:
            pipeline_id: ${resources.pipelines.acme_ampcore_pipeline.id}
            full_refresh: false

        - task_key: ampcore_connection_config
          depends_on:
            - task_key: ampcore_pipeline
          notebook_task:
            notebook_path: ../src/connectors/ampcore/batch/ampcore_connection_config.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: b10_connection_status
          depends_on:
            - task_key: ampcore_connection_config
          notebook_task:
            notebook_path: ../src/shared/b10_update_batch_connection_metadata.py
            base_parameters:
              catalog_name: ${var.acme_catalog}
              connector: ampcore_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 1800

        - task_key: b99_pipeline_failure_status
          depends_on:
            - task_key: ampcore_data_api2land
          run_if: AT_LEAST_ONE_FAILED
          notebook_task:
            notebook_path: ../src/shared/b99_pipeline_failure_status.py
            base_parameters:
              connector: ampcore_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 600

      environments:
        - environment_key: serverless-env
          spec:
            client: "1"

      tags:
        client: acme
        brand: ampcore
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: batch
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: client_name
          default: ACME
        - name: secret_scope
          default: acme_ampcore_api_creds
        - name: volume_name
          default: ampcore_batch

    acme_smartnode_batch_job:
      name: acme smartnode batch job
      description: >-
        Batch pipeline for Smartnode mySmartnode energy data (ACME):

        0. b00_pause_controller: Checks if job should be paused based on client-defined date ranges.

        1. smartnode_data_api2land: Fetches hourly energyassetbundles for the previous UTC day
           from the Smartnode REST API and writes raw JSON envelopes to the smartnode_batch land volume.

        2. smartnode_metadata_api2land: Fetches daily metadata snapshot (account, addresses,
           energyassets) and writes to the land volume. Runs after data api2land to avoid
           overwhelming the API with concurrent requests.

        3. smartnode_pipeline: LDP pipeline (acme_smartnode_pipeline). Materialises bronze, silver,
           and gold tables for data and metadata from the landing volume.

        4. smartnode_connection_config: Creates views.smartnode_hourly and upserts one
           connection_config row per (accountId, energyassetId) into metadata.connection_config.

        5. b10_connection_status: Reads connection_config rows for connector=smartnode_api and
           appends connection status records to metadata.connection_status.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: "0 0 10 * * ?"
        timezone_id: Europe/Amsterdam
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/shared/b00_pause_controller.py
            base_parameters:
              job_name: smartnode
              catalog_name: ${var.acme_catalog}
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: smartnode_data_api2land
          depends_on:
            - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/connectors/smartnode/batch/smartnode_data_api2land.py
            source: WORKSPACE
          environment_key: serverless-env
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          timeout_seconds: 3600

        - task_key: smartnode_metadata_api2land
          depends_on:
            - task_key: smartnode_data_api2land
          notebook_task:
            notebook_path: ../src/connectors/smartnode/batch/smartnode_metadata_api2land.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: smartnode_pipeline
          depends_on:
            - task_key: smartnode_data_api2land
            - task_key: smartnode_metadata_api2land
          pipeline_task:
            pipeline_id: ${resources.pipelines.acme_smartnode_pipeline.id}
            full_refresh: false

        - task_key: smartnode_connection_config
          depends_on:
            - task_key: smartnode_pipeline
          notebook_task:
            notebook_path: ../src/connectors/smartnode/batch/smartnode_connection_config.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: b10_connection_status
          depends_on:
            - task_key: smartnode_connection_config
          notebook_task:
            notebook_path: ../src/shared/b10_update_batch_connection_metadata.py
            base_parameters:
              catalog_name: ${var.acme_catalog}
              connector: smartnode_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 1800

        - task_key: b99_pipeline_failure_status
          depends_on:
            - task_key: smartnode_data_api2land
          run_if: AT_LEAST_ONE_FAILED
          notebook_task:
            notebook_path: ../src/shared/b99_pipeline_failure_status.py
            base_parameters:
              connector: smartnode_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 600

      environments:
        - environment_key: serverless-env
          spec:
            client: "1"

      tags:
        client: acme
        brand: smartnode
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: batch
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: secret_scope
          default: acme_smartnode_api_creds
        - name: volume_name
          default: smartnode_batch
        - name: offset_days
          default: "1"

# Production target-specific overrides for pause/unpause control
targets:
  lmx-prod:
    resources:
      jobs:
        acme_ampcore_batch_job:
          schedule:
            pause_status: UNPAUSED

        acme_smartnode_batch_job:
          schedule:
            pause_status: UNPAUSED
