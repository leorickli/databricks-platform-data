            source: WORKSPACE
          environment_key: serverless-env
          max_retries: 2
          min_retry_interval_millis: 300000
          retry_on_timeout: true
          timeout_seconds: 3600

        - task_key: smartnode_metadata_api2land
          depends_on:
            - task_key: smartnode_data_api2land
          notebook_task:
            notebook_path: ../src/connectors/smartnode/batch/smartnode_metadata_api2land.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: smartnode_pipeline
          depends_on:
            - task_key: smartnode_data_api2land
            - task_key: smartnode_metadata_api2land
          pipeline_task:
            pipeline_id: ${resources.pipelines.acme_smartnode_pipeline.id}
            full_refresh: false

        - task_key: smartnode_connection_config
          depends_on:
            - task_key: smartnode_pipeline
          notebook_task:
            notebook_path: ../src/connectors/smartnode/batch/smartnode_connection_config.py
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 900

        - task_key: b10_connection_status
          depends_on:
            - task_key: smartnode_connection_config
          notebook_task:
            notebook_path: ../src/shared/b10_update_batch_connection_metadata.py
            base_parameters:
              catalog_name: ${var.acme_catalog}
              connector: smartnode_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 1800

        - task_key: b99_pipeline_failure_status
          depends_on:
            - task_key: smartnode_data_api2land
          run_if: AT_LEAST_ONE_FAILED
          notebook_task:
            notebook_path: ../src/shared/b99_pipeline_failure_status.py
            base_parameters:
              connector: smartnode_api
            source: WORKSPACE
          environment_key: serverless-env
          timeout_seconds: 600

      environments:
        - environment_key: serverless-env
          spec:
            client: "1"

      tags:
        client: acme
        brand: smartnode
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: batch
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: secret_scope
          default: acme_smartnode_api_creds
        - name: volume_name
          default: smartnode_batch
        - name: offset_days
          default: "1"

# Production target-specific overrides for pause/unpause control
targets:
  dpx-prod:
    resources:
      jobs:
        acme_tracksys_batch_job:
          schedule:
            pause_status: PAUSED

        acme_tracksys_stream_job:
          continuous:
            pause_status: PAUSED

        acme_ecosphere_batch_job:
          schedule:
            pause_status: UNPAUSED

        acme_wattflow_batch_job:
          schedule:
            pause_status: UNPAUSED

        acme_ampcore_batch_job:
          schedule:
            pause_status: UNPAUSED

        acme_smartnode_batch_job:
          schedule:
            pause_status: UNPAUSED