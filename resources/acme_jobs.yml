resources:
  jobs:
    acme_tracksys_batch_job:
      name: acme tracksys batch job
      description: >-
        Batch pipeline for Acme:

        1. b01_api_ingestion: Extract CSV and ASC source data from the API.

        2. b02_land2bronze: Transforms the CSV data in tabular parquet format and becomes the source of truth.

        3. b03_bronze2silver: Unpivots the CSV data into long format with a single timestamp.

        4. b04_silver2gold: Assert business logic to the table.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      timeout_seconds: 10800
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 7200
      schedule:
        quartz_cron_expression: 9 0 12 * * ?
        timezone_id: UTC
        pause_status: PAUSED
      max_concurrent_runs: 4
      tasks:
        - task_key: b01_api_ingestion
          notebook_task:
            notebook_path: ../src/connectors/tracksys/batch/b01_tracksys_source2land.py
            source: WORKSPACE
          job_cluster_key: memory_intensive_cluster
          max_retries: 3
          min_retry_interval_millis: 60000
          retry_on_timeout: true
        - task_key: b02_land2bronze
          depends_on:
            - task_key: b01_api_ingestion
          notebook_task:
            notebook_path: ../src/connectors/tracksys/batch/b02_tracksys_land2bronze.py
            source: WORKSPACE
          job_cluster_key: memory_intensive_cluster
        - task_key: b03_bronze2silver
          depends_on:
            - task_key: b02_land2bronze
          notebook_task:
            notebook_path: ../src/connectors/tracksys/batch/b03_tracksys_bronze2silver.py
            source: WORKSPACE
          job_cluster_key: memory_intensive_cluster
        - task_key: b04_silver2gold
          depends_on:
            - task_key: b03_bronze2silver
          dbt_task:
            project_directory: ../dbt
            commands:
              - dbt deps --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files --profile ${var.dbt_profile}
              - dbt seed --select dpx acme --vars '{"acme_catalog":"${var.acme_catalog}","dpx_catalog":"${var.dpx_catalog}"}' --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files --profile ${var.dbt_profile}
              - dbt run --select tracksys_batch --vars '{"acme_catalog":"${var.acme_catalog}"}' --profile ${var.dbt_profile} --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files
            catalog: ${var.acme_catalog}
            schema: gold
            warehouse_id: ${var.sql_warehouse_id}
            source: WORKSPACE
          environment_key: dbt-default
      job_clusters:
        - job_cluster_key: memory_intensive_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: r8g.xlarge
            driver_node_type_id: r8g.xlarge
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            autoscale:
              min_workers: 1
              max_workers: 4
      tags:
        client: acme
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: batch
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: secret_scope
          default: tracksys_api_credentials
        - name: volume_name
          default: tracksys_batch
        - name: checkpoint_table_name
          default: processing_checkpoint_batch
        - name: silver_table_name
          default: tracksys_batch
        - name: report_table_name
          default: imei_signal_mappings_batch
      environments:
        - environment_key: dbt-default
          spec:
            environment_version: 2
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
      performance_target: PERFORMANCE_OPTIMIZED

    acme_tracksys_stream_job:
      name: acme tracksys stream job
      description: >-
        Streaming pipeline for Acme:

        1. b01_ddl_statements: Creates the Delta tables first so the job will not return an error in case a downstream task starts first.

        2. s02_ingest2bronze: Reads from Kinesis source into a bronze table.

        3. s03_imei_registry: Reads the bronze table to identify new device IMEIs along with its unique signals for each parameter.

        4. s04_process2silver: Enriches the bronze data by joining it with the imei_registry_stream table to get the correct signal mappings for each device.

        5. s05_write2kinesis_bronze: Reads the continuous stream of new records from the bronze Delta table.

        6. s06_write2kinesis_silver: Reads the continuous stream of new records from the silver Delta table.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      continuous:
        pause_status: PAUSED
      tasks:
        - task_key: b01_ddl_statements
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/b01_ddl_statements.py
            source: WORKSPACE
        - task_key: s02_ingest2bronze
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/s02_kinesis2bronze.py
            source: WORKSPACE
          job_cluster_key: process_to_bronze_cluster
        - task_key: s03_imei_registry
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/s03_imei_registry_stream.py
            source: WORKSPACE
          job_cluster_key: imei_registry_cluster
        - task_key: s04_process2silver
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/s04_bronze2silver.py
            source: WORKSPACE
          job_cluster_key: process_to_silver_cluster
        - task_key: s05_write2kinesis_bronze
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/s05_bronze2kinesis.py
            source: WORKSPACE
          job_cluster_key: write_to_kinesis_bronze_cluster
        - task_key: s06_write2kinesis_silver
          notebook_task:
            notebook_path: ../src/connectors/tracksys/stream/s06_silver2kinesis.py
            source: WORKSPACE
          job_cluster_key: write_to_kinesis_silver_cluster
      job_clusters:
        - job_cluster_key: imei_registry_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              instance_profile_arn: arn:aws:iam::867344430965:instance-profile/dpx-databricks-data-access-profile
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: r8g.large
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 4
        - job_cluster_key: process_to_silver_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              instance_profile_arn: arn:aws:iam::867344430965:instance-profile/dpx-databricks-data-access-profile
              spot_bid_price_percent: 100
            node_type_id: m7gd.xlarge
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 4
        - job_cluster_key: process_to_bronze_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              instance_profile_arn: arn:aws:iam::867344430965:instance-profile/dpx-databricks-data-access-profile
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: m8g.large
            driver_node_type_id: m8g.xlarge
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 4
        - job_cluster_key: write_to_kinesis_silver_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              instance_profile_arn: arn:aws:iam::867344430965:instance-profile/dpx-databricks-data-access-profile
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: m8g.large
            driver_node_type_id: m8g.xlarge
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 4
        - job_cluster_key: write_to_kinesis_bronze_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              instance_profile_arn: arn:aws:iam::867344430965:instance-profile/dpx-databricks-data-access-profile
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: m8g.large
            driver_node_type_id: m8g.xlarge
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
            autoscale:
              min_workers: 1
              max_workers: 4
      tags:
        client: acme
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: stream
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: bronze_table_name
          default: tracksys_stream
        - name: silver_table_name
          default: tracksys_stream
        - name: imei_registry_table_name
          default: imei_signal_mappings_streaming
        - name: imei_state_table_name
          default: imei_signal_mappings_state_streaming

    acme_ecosphere_batch_job:
      name: acme ecosphere batch job
      description: >-
        Batch pipeline for Ecosphere energy data:

        0. b00_pause_controller: Checks if job should be paused based on client-defined date ranges in pause_schedules table.

        1. b01_api2land: Fetches daily data from Ecosphere public API for all configured buildings and writes JSON files to land volume.

        2. b02_land2bronze: Processes JSON files using Auto Loader, routes each file to the correct bronze table based on endpoint_name. Runs in parallel with b05_dbt_dimensions.

        3. b03_bronze2silver: Transforms bronze data to ESDL ontology-aligned silver layer, split by energy carrier and asset type.

        4. b04_silver2gold: Promotes silver fact data to gold layer, adding surrogate foreign keys (skBuilding, skEConnection, etc.) that link to ESDL dimension tables. Waits for both b03_bronze2silver and b05_dbt_dimensions.

        5. b05_dbt_dimensions: Seeds ecosphere dimension CSVs and runs dbt models tagged 'ecosphere' (d_ecosphere_*). Post-hooks drop the raw seed tables after dimensions are built. Runs in parallel with b02_land2bronze.

        6. b05_ecosphere_connection_config: Auto-discovers Ecosphere buildings from silver tables and upserts one connection_config row per building × silver table into metadata.connection_config.

        7. b10_update_batch_connection_metadata: Reads connection_config rows for connector=ecosphere_api and appends connection status records to metadata.connection_status for historical tracking.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: "0 0 10 * * ?"
        timezone_id: Europe/Amsterdam
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/shared/b00_pause_controller.py
            base_parameters:
              job_name: ecosphere
              catalog_name: ${var.acme_catalog}
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 900
        - task_key: b01_api2land
          depends_on:
            - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/connectors/ecosphere/batch/b01_ecosphere_api2land.py
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          max_retries: 4
          min_retry_interval_millis: 3600000
          retry_on_timeout: true
          timeout_seconds: 1800
        - task_key: b02_land2bronze
          depends_on:
            - task_key: b01_api2land
          notebook_task:
            notebook_path: ../src/connectors/ecosphere/batch/b02_ecosphere_land2bronze.py
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 1800
        - task_key: b05_dbt_dimensions
          depends_on:
            - task_key: b01_api2land
          dbt_task:
            project_directory: ../dbt
            commands:
              - dbt deps --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files --profile ${var.dbt_profile}
              - dbt seed --select acme.ecosphere --vars '{"acme_catalog":"${var.acme_catalog}"}' --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files --profile ${var.dbt_profile}
              - dbt run --select tag:ecosphere --vars '{"acme_catalog":"${var.acme_catalog}"}' --profile ${var.dbt_profile} --profiles-dir /Workspace/Users/developer@example.com/.bundle/dataplatformx-data/${bundle.target}/files
            catalog: ${var.acme_catalog}
            schema: gold
            warehouse_id: ${var.sql_warehouse_id}
            source: WORKSPACE
          environment_key: dbt-default
        - task_key: b03_bronze2silver
          depends_on:
            - task_key: b02_land2bronze
          notebook_task:
            notebook_path: ../src/connectors/ecosphere/batch/b03_ecosphere_bronze2silver.py
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 1800
        - task_key: b04_silver2gold
          depends_on:
            - task_key: b03_bronze2silver
            - task_key: b05_dbt_dimensions
          notebook_task:
            notebook_path: ../src/connectors/ecosphere/batch/b04_ecosphere_silver2gold.py
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 1800
        - task_key: b05_ecosphere_connection_config
          depends_on:
            - task_key: b04_silver2gold
          notebook_task:
            notebook_path: ../src/connectors/ecosphere/batch/b05_ecosphere_connection_config.py
            base_parameters:
              catalog_name: ${var.acme_catalog}
              client_name: ACME
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 900
        - task_key: b10_connection_status
          depends_on:
            - task_key: b05_ecosphere_connection_config
          notebook_task:
            notebook_path: ../src/shared/b10_update_batch_connection_metadata.py
            base_parameters:
              catalog_name: ${var.acme_catalog}
              connector: ecosphere_api
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 1800
        - task_key: b99_pipeline_failure_status
          depends_on:
            - task_key: b01_api2land
          run_if: AT_LEAST_ONE_FAILED
          notebook_task:
            notebook_path: ../src/shared/b99_pipeline_failure_status.py
            base_parameters:
              connector: ecosphere_api
            source: WORKSPACE
          job_cluster_key: ecosphere_batch_cluster
          timeout_seconds: 600
      job_clusters:
        - job_cluster_key: ecosphere_batch_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK
              zone_id: auto
              spot_bid_price_percent: 100
              ebs_volume_type: GENERAL_PURPOSE_SSD
              ebs_volume_count: 3
              ebs_volume_size: 100
            node_type_id: m8g.large
            driver_node_type_id: m8g.large
            enable_elastic_disk: false
            data_security_mode: SINGLE_USER
            runtime_engine: STANDARD
            autoscale:
              min_workers: 1
              max_workers: 4
      tags:
        client: acme
        brand: ecosphere
        dev: ${var.developer_tag}
        environment: ${var.environment_name}
        process_type: batch
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.acme_catalog}
        - name: secret_scope
          default: acme_ecosphere_api_creds
        - name: client_name
          default: ACME
        - name: volume_name
          default: ecosphere_batch
        - name: offset_days
          default: "1"
      environments:
        - environment_key: dbt-default
          spec:
            environment_version: 2
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
      performance_target: PERFORMANCE_OPTIMIZED

    acme_wattflow_batch_job:
      name: acme wattflow batch job
      description: >-
        Batch pipeline for Wattflow energy data:

        0. b00_pause_controller: Checks if job should be paused based on client-defined date ranges in pause_schedules table.

        1. b01_api2land: Fetches daily aggregate data from Wattflow e-dataportal API for all configured EANs and writes JSON files to land volume.

        2. b02_land2bronze: Processes JSON files using Auto Loader, unpivots measurements array, and writes to bronze table.

        3. b03_bronze2silver: Transforms bronze data to Haystack-aligned silver layer with ontology-compliant point types and marker tags.

        4. b04_silver2gold: Applies business logic via dbt and creates gold fact table (f_wattflow_dap_batch).

        5. b05_wattflow_connection_config: Generates connection_config entries for all Wattflow EANs from d_wattflow_sites dimension table (both active and inactive).

        6. b10_update_batch_connection_metadata: Reads connection_config rows for connector=wattflow_api and appends connection status records to metadata.connection_status for historical tracking.
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: "0 0 10 * * ?"
        timezone_id: Europe/Amsterdam
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: b00_pause_controller
          notebook_task:
            notebook_path: ../src/shared/b00_pause_controller.py
            base_parameters:
              job_name: wattflow
              catalog_name: ${var.acme_catalog}
            source: WORKSPACE
          job_cluster_key: wattflow_batch_cluster
          timeout_seconds: 900
        - task_key: b01_api2land
