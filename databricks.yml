bundle:
  name: lmx-data

include:
  - resources/*.yml

variables:
  spark_version:
    description: "Databricks Runtime version for all job clusters (e.g. 17.1.x-scala2.13). Update here to upgrade all clusters at once."
    default: "17.3.x-scala2.13"
  environment_name:
    description: "Environment name (dev, prod, etc.)"
  acme_catalog:
    description: "ACME catalog name (client + environment)"
  lmx_catalog:
    description: "LMX catalog name (client + environment)"
  notification_emails:
    description: "Email addresses for job notifications"
    type: complex
  developer_tag:
    description: "Developer name for resource tagging"

targets:
  lmx-dev:
    mode: development
    default: true
    workspace:
      profile: lmx-dev
      host: https://dbc-00000000-0000.cloud.databricks.com
    permissions:
      - user_name: developer@example.com
        level: CAN_MANAGE
      - group_name: developers
        level: CAN_VIEW
    variables:
      acme_catalog: acme_dev
      lmx_catalog: lmx_dev
      environment_name: dev
      notification_emails:
        - developer@example.com
      developer_tag: developer
  lmx-prod:
    mode: production
    default: false
    workspace:
      profile: lmx-prod
      host: https://dbc-11111111-1111.cloud.databricks.com
      root_path: /Workspace/Users/developer@example.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      acme_catalog: acme_prod
      lmx_catalog: lmx_prod
      environment_name: prod
      notification_emails:
        - developer@example.com
        # - teammate@example.com
      developer_tag: production
  lmx-stg:
    mode: production
    default: false
    workspace:
      profile: lmx-stg
      host: https://dbc-22222222-2222.cloud.databricks.com
      root_path: /Workspace/Users/developer@example.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: developer@example.com
        level: CAN_MANAGE
      - group_name: developers
        level: CAN_VIEW
    variables:
      acme_catalog: acme_stg
      lmx_catalog: lmx_stg
      environment_name: stg
      notification_emails:
        - developer@example.com
      developer_tag: staging

sync:
  include:
    - src/*/*/*/*.py
    - src/shared/*.py