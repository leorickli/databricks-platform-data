models:
  ### ACME
  - name: tracksys_batch
    description: Refined telemetry data showing the average values in a 15-minute interval. ESDL Battery-aligned naming.
    columns:
      - name: skAsset
        description: Surrogate key for the battery asset (sha2-256 on loggerImei), stable across reruns
      - name: timestamp
        description: 15-minute window start timestamp
      - name: eventDate
        description: Calendar date derived from timestamp
      - name: loggerImei
        description: International Mobile Equipment Identity of the data logger device (originalIdInSource on the ESDL Battery asset)
      - name: SoC
        description: Average state of charge in the 15-minute window (ESDL Battery.SoC, %)
      - name: voltage
        description: Average battery voltage in the 15-minute window (ESDL Battery.V, V — DC Bus)
      - name: current
        description: Average battery current in the 15-minute window (ESDL Battery.A, A — DC Bus)
      - name: activePower
        description: Average battery active power in the 15-minute window, derived as voltage * current (ESDL Battery.W, W)
      - name: goldProcessingTimestamp
        description: Timestamp when this row was written to gold

  - name: f_wattflow_dap_batch
    description: |
      Gold layer fact table for Wattflow DAP (Data Access Point) meter measurements.
      Contains 15-minute interval electricity consumption and production data
      from construction site grid connection meters (siteMeter markers).

      **Schema Structure**: Tariff rate stored as timestamp-level attribute instead of
      duplicated across measurement columns. Each row contains 4 base energy measurements
      plus tariff rate indicator and calculated derived metrics.

      Aligned with ESDL v2 ontology (snake_case).

      Site metadata can be joined via sk_econnection to d_wattflow_sites dimension table.
    config:
      materialized: incremental
      incremental_strategy: append
      on_schema_change: append_new_columns
      schema: gold
      cluster_by: auto
      tags: ['meter', 'wattflow', 'haystack', 'wattflow_batch', 'acme']
    columns:
      # Identifiers
      - name: dap_id
        description: "Natural key for meter - DAP ID (snake_case ESDL v2)"
        tests:
          - not_null
      - name: ean
        description: "EAN code - energy connection identifier"
        tests:
          - not_null
      - name: key
        description: "Meter key (sleutel) - unique physical meter identifier. Combined with EAN forms the natural key."
        tests:
          - not_null
      - name: sk_econnection
        description: "Surrogate key for site - MD5 hash of ean + key"
        tests:
          - not_null

      # Time Dimensions
      - name: timestamp
        description: "Measurement timestamp (end of interval) - snake_case ESDL v2"
        tests:
          - not_null
      - name: measurement_date
        description: "Date partition for measurements - snake_case ESDL v2"
        tests:
          - not_null

      # Contextual Attributes
      - name: tariff_rate
        description: "Tariff rate for this timestamp: low (off-peak) or normal (peak)"
        tests:
          - not_null
          - accepted_values:
              values: ['low', 'normal']
      - name: is_peak_demand
        description: "Peak demand flag - true when this interval represents maximum demand"

      # Base Energy Measurements (from silver)
      - name: energy_import
        description: "AC active energy imported from grid (kWh)"
      - name: energy_export
        description: "AC active energy exported to grid (kWh)"
      - name: reactive_energy_import
        description: "AC reactive energy imported from grid (kVARh)"
      - name: reactive_energy_export
        description: "AC reactive energy exported to grid (kVARh)"

      # Derived Metrics (calculated in gold)
      - name: energy_throughput
        description: "Total active energy (import + export) in kWh"
      - name: reactive_energy_throughput
        description: "Total reactive energy (import + export) in kVARh"
      - name: energy_net
        description: "Net active energy (import - export) in kWh - positive=net consumer, negative=net producer"
      - name: reactive_energy_net
        description: "Net reactive energy (import - export) in kVARh"

      # Processing Metadata
      - name: gold_processing_timestamp
        description: "Timestamp when this row was written to the gold layer - used to calculate ingestion delay (gold_processing_timestamp - timestamp)"

    ### GLOBEX
  - name: f_solarflow_inverter_mjp0e6b0t5_batch
    description: Haystack-compliant telemetry data from Solarflow inverter (Plant 10318726, SN mjp0e6b0t5) at 15-minute intervals. All fields follow Project Haystack and Sunspec ontology naming conventions for cross-vendor interoperability.
    config:
      materialized: incremental
      unique_key: ['timestamp', 'sk_inverter']
      incremental_strategy: append
      schema: gold
      tags: ['inverter', 'solarflow', 'haystack', 'solarflow_batch', 'globex']
    columns:
      - name: timestamp
        description: Measurement timestamp from the inverter
        tests:
          - not_null
      - name: sk_inverter
        description: Device surrogate key - references d_inverters.sk_inverter
        tests:
          - not_null
          - relationships:
              to: source('globex_gold', 'd_inverters')
              field: sk_inverter
      - name: sk_site
        description: Site surrogate key - references dim_site.sk_site
      - name: sk_space
        description: Space surrogate key - references dim_space.sk_space
      - name: ac_power
        description: AC Power (W)
      - name: ac_current_l1
        description: Phase A Current (A)
      - name: ac_current_l2
        description: Phase B Current (A)
      - name: ac_current_l3
        description: Phase C Current (A)
      - name: ac_energy_production
        description: AC Energy (KWh)
      - name: dc_power
        description: DC Power (W)
      - name: ac_frequency
        description: Line Frequency (H)
      - name: ac_power_factor
        description: AC Power Factor
      - name: ac_voltage_l1_l2
        description: Phase Voltage AB (V)
      - name: ac_voltage_l2_l3
        description: Phase Voltage BC (V)
      - name: ac_voltage_l3_l1
        description: Phase Voltage CA (V)
      - name: ac_voltage_l1
        description: Phase Voltage AN (V)
      - name: ac_voltage_l2
        description: Phase Voltage BN (V)
      - name: ac_voltage_l3
        description: Phase Voltage CN (V)
      - name: temperature_other
        description: Other Temperature (°C)
      - name: operating_state
        description: Operating state. (8→STANDBY, 4→MPPT, 7→FAULT)

