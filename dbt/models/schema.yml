  ### ECOSPHERE
  - name: d_ecosphere_buildings
    description: |
      ESDL-aligned dimension table for Ecosphere Building objects.
      Contains physical building attributes seeded from ESDL ontology (type, energy label, floor area, etc.).
      All Ecosphere silver telemetry tables reference buildings via building_uuid, which maps to the id field here.
      Surrogate key generated via MD5(id).
    config:
      materialized: table
      file_format: delta
      schema: gold
      post_hook: "DROP TABLE IF EXISTS {{ var('acme_catalog', 'acme_dev') }}.gold.ecosphere_buildings"
      tags: ['dimension', 'ecosphere', 'esdl', 'building']
    columns:
      - name: sk_building
        description: "MD5 surrogate key from ESDL id - use for joins from fact tables"
        tests:
          - unique
          - not_null
      - name: id
        description: "ESDL Building id - matches building_uuid in Ecosphere silver tables"
        tests:
          - not_null
    constraints:
      - type: primary_key
        columns: [sk_building]

  - name: d_ecosphere_econnections
    description: |
      ESDL-aligned dimension table for Ecosphere EConnection (Electricity Connection) objects.
      Represents the electricity demarcation point (smart meter) between building and grid.
      Joins with fact tables: ecosphere_batch_econnection_history, ecosphere_batch_econnection_meterreadings.
    config:
      materialized: table
      file_format: delta
      schema: gold
      post_hook: "DROP TABLE IF EXISTS {{ var('acme_catalog', 'acme_dev') }}.gold.ecosphere_econnections"
      tags: ['dimension', 'ecosphere', 'esdl', 'econnection']
    columns:
      - name: sk_econnection
        description: "MD5 surrogate key from ESDL id"
        tests:
          - unique
          - not_null
      - name: id
        description: "ESDL EConnection id"
        tests:
          - not_null
    constraints:
      - type: primary_key
        columns: [sk_econnection]

  - name: d_ecosphere_hconnections
    description: |
      ESDL-aligned dimension table for Ecosphere HConnection (Heat Connection) objects.
