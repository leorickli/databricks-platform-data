  - name: d_wattflow_sites
    description: |
      ESDL EConnection dim for Wattflow DAP meter sites. CSV seed (wattflow_sites)
      keeps Haystack-style Dutch + camelCase source names; the dim translates
      everything to snake_case English on output (e.g. sleutel→key,
      klantnummer→customer_number, dapId→dap_id, geoAddr→geo_addr…).

      Each Wattflow meter is one ESDL EConnection. sk_econnection = MD5(ean ‖ sleutel).
      The seed table is dropped after model creation via post-hook.
    config:
      materialized: table
      file_format: delta
      schema: gold
      post_hook: "DROP TABLE IF EXISTS {{ var('acme_catalog', 'acme_dev') }}.gold.wattflow_sites"
      tags: ['metadata', 'wattflow', 'acme']
    columns:
      - name: sk_econnection
        description: "ESDL EConnection surrogate key — MD5(CONCAT(ean, sleutel))"
        tests:
          - unique
          - not_null
      - name: ean
        description: "EAN code - energy connection identifier (can have multiple meters)"
      - name: key
        description: "Meter key — unique identifier for individual meter at EAN connection point (translated from CSV `sleutel`)"
      - name: dap_id
        description: "DAP (Data Access Point) identifier from Wattflow (translated from CSV `dapId`)"
      - name: dis
        description: "Haystack display name - full location description"
      - name: geo_addr
        description: "Complete address string (translated from CSV `geoAddr`)"
      - name: geo_street
        description: "Street name and number (translated from CSV `geoStreet`)"
      - name: geo_city
        description: "City name (translated from CSV `geoCity`)"
      - name: geo_postal_code
        description: "Postal code (translated from CSV `geoPostalCode`)"
      - name: geo_country
        description: "Country - Netherlands (translated from CSV `geoCountry`)"
      - name: tz
        description: "Timezone - Europe/Amsterdam"
      - name: meter_status
        description: "Meter status: active or inactive"
        tests:
          - accepted_values:
              values: ['active', 'inactive']
      - name: entity
        description: "Business entity owning/managing the meter"
      - name: customer_number
        description: "Customer number (translated from CSV `klantnummer`)"
      - name: type
        description: "Site type - e.g., Kantoor (office), null for residential/other"
    constraints:
      - type: primary_key
        columns: [sk_econnection]

