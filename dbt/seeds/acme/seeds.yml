version: 2

seeds:
  - name: wattflow_sites
    description: |
      Haystack-compliant site metadata for Wattflow construction sites across Netherlands.

      This seed contains site information extracted from Wattflow Excel metadata including:
      - Geographic location data (addresses, postal codes, cities)
      - Meter identification (EAN codes, meter keys)
      - Business classification (entity, customer numbers, status)
      - Site classification (primary_function: office or residential)

      All field names comply with Project Haystack ontology for sites (geoPlace tags).
      This seed feeds the dim_wattflow_sites dimension table in the gold layer.

    config:
      schema: gold
      database: "{{ var('acme_catalog', 'acme_dev') }}"
      column_types:
        ean: string
        dapId: string
        sleutel: string
        klantnummer: string

    columns:
      - name: connector
        description: "Data source connector - always 'wattflow_api'"
        tests:
          - not_null
          - accepted_values:
              values: ['wattflow_api']

      - name: dis
        description: "Display name for the site - human-readable address (Haystack: dis)"
        tests:
          - not_null

      - name: geoAddr
        description: "Free form street address (Haystack: geoAddr)"

      - name: geoStreet
        description: "Geographic street address (Haystack: geoStreet)"

      - name: geoCity
        description: "Geographic city or locality name (Haystack: geoCity)"

      - name: geoPostalCode
        description: "Geographic postal code in Dutch format (Haystack: geoPostalCode)"

      - name: geoCountry
        description: "Geographic country (Haystack: geoCountry)"
        tests:
          - accepted_values:
              values: ['Netherlands']

      - name: tz
        description: "Timezone identifier - always 'Europe/Amsterdam' (Haystack: tz)"
        tests:
          - not_null
          - accepted_values:
              values: ['Europe/Amsterdam']

      - name: ean
        description: "European Article Number - unique energy connection identifier (18 digits)"
        tests:
          - not_null

      - name: dapId
        description: "DAP (Data Access Point) identifier from Wattflow system"
        tests:
          - not_null

      - name: sleutel
        description: "Wattflow-specific meter key/sleutel identifier"
        tests:
          - not_null

      - name: meter_status
        description: "Operational status of the meter connection"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'inactive']

      - name: entity
        description: "Business entity or department responsible for the site (e.g., B&T, BES, Wonen)"
        tests:
          - not_null

      - name: klantnummer
        description: "Wattflow customer number (Klantnummer)"
        tests:
          - not_null

      - name: type
        description: "Type of site (e.g., Kantoor for office)"
