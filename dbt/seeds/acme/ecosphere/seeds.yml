        tests:
          - accepted_values:
              values: ['PRIMARY', 'FINAL']
      - name: power
        description: "Maximum charging power per connector in Watts (ESDL: power)"
      - name: power_factor
        description: "Power factor of the charger (ESDL: power_factor)"
      - name: full_load_hours
        description: "Annual hours at full charging load (ESDL: full_load_hours)"
      - name: operational_hours
        description: "Hours per year the charger is operational (ESDL: operational_hours)"
      - name: number_of_connectors
        description: "Number of charging connectors (sockets) (ESDL: number_of_connectors)"
      - name: efficiency
        description: "Charging efficiency as percentage (ESDL: efficiency)"
      - name: commissioning_date
        description: "Date the charger was commissioned (ESDL: commissioning_date)"
      - name: decommissioning_date
        description: "Date the charger was or will be decommissioned (ESDL: decommissioning_date)"
      - name: installation_duration
        description: "Installation duration in days (ESDL: installation_duration)"
      - name: technical_lifetime
        description: "Expected technical lifetime in years (ESDL: technical_lifetime)"
      - name: surface_area
        description: "Installation footprint in m² (ESDL: surface_area)"
      - name: aggregated
        description: "Whether this record is an aggregation of multiple chargers (ESDL: aggregated)"
      - name: aggregation_count
        description: "Number of chargers aggregated (ESDL: aggregation_count)"
