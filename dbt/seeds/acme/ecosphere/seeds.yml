version: 2

seeds:
  - name: ecosphere_buildings
    description: |
      ESDL-aligned dimension seed for Building objects in the Ecosphere pipeline.
      Contains physical building attributes (type, energy label, floor area, etc.)
      that serve as the dimension for joining with all Ecosphere telemetry fact tables
      via building_uuid. Source of truth is the ESDL Building object definition.
    config:
      schema: gold
      database: "{{ var('acme_catalog', 'acme_dev') }}"
      column_types:
        id: string
        original_id_in_source: string
        building_year: int
        energy_index: double
        floor_area: double
        number_of_floors: int
        surface_area: int
        installation_duration: double
        technical_lifetime: double
        aggregated: boolean
        aggregation_count: int
    columns:
      - name: id
        description: "Unique identifier for the building - matches building_uuid in silver tables (ESDL: id)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Human-readable building name (ESDL: name)"
        tests:
          - not_null
      - name: description
        description: "Extended description of the building (ESDL: description)"
      - name: short_name
        description: "Short name or code for the building (ESDL: short_name)"
      - name: original_id_in_source
        description: "Original identifier from the Ecosphere source system (ESDL: original_id_in_source)"
      - name: type
        description: "Building type enum (e.g., RESIDENTIAL, OFFICE, UTILITY) (ESDL: BuildingTypeEnum)"
      - name: building_year
        description: "Year of construction (ESDL: building_year)"
      - name: energy_label
        description: "Dutch energy performance label (A/B/C/D/E/F/G) (ESDL: EnergyLabelEnum)"
      - name: energy_index
        description: "Energy performance index - lower is better (ESDL: energy_index)"
      - name: floor_area
        description: "Total floor area in m² (ESDL: floor_area)"
      - name: number_of_floors
        description: "Number of floors in the building (ESDL: number_of_floors)"
      - name: asset_type
        description: "Model number or type designation from manufacturer (ESDL: asset_type)"
      - name: manufacturer
        description: "Manufacturer or developer of the building (ESDL: manufacturer)"
      - name: owner
        description: "Owner of the building (ESDL: owner)"
      - name: state
        description: "Asset operational state (OPERATIONAL, PLANNED, DISABLED) (ESDL: AssetStateEnum)"
        tests:
          - accepted_values:
              values: ['OPERATIONAL', 'PLANNED', 'DISABLED', 'REMOVED']
      - name: surface_area
        description: "Ground surface area in m² (ESDL: surface_area)"
      - name: commissioning_date
        description: "Date the building was commissioned (ESDL: commissioning_date)"
      - name: decommissioning_date
        description: "Date the building was or will be decommissioned (ESDL: decommissioning_date)"
      - name: installation_duration
        description: "Duration of installation in days (ESDL: installation_duration)"
      - name: technical_lifetime
        description: "Expected technical lifetime in years (ESDL: technical_lifetime)"
      - name: aggregated
        description: "Whether this record represents an aggregation of multiple buildings (ESDL: aggregated)"
      - name: aggregation_count
        description: "Number of buildings aggregated into this record (ESDL: aggregation_count)"

  - name: ecosphere_econnections
    description: |
      ESDL-aligned dimension seed for EConnection (Electricity Connection) objects in the Ecosphere pipeline.
      Represents the electricity demarcation point between the building and the grid (smart meter).
      Attributes describe the physical connection characteristics (EAN code, contracted power, etc.).
      Joins with fact tables: ecosphere_batch_econnection_history, ecosphere_batch_econnection_meterreadings.
    config:
      schema: gold
      database: "{{ var('acme_catalog', 'acme_dev') }}"
      column_types:
        id: string
        ean_code: string
        original_id_in_source: string
        contract_power: double
        surface_area: int
        installation_duration: double
        technical_lifetime: double
        aggregated: boolean
        aggregation_count: int
    columns:
      - name: id
        description: "Unique identifier for the electricity connection (ESDL: id)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Human-readable connection name (ESDL: name)"
        tests:
          - not_null
      - name: description
        description: "Extended description of the electricity connection (ESDL: description)"
      - name: short_name
        description: "Short name or code (ESDL: short_name)"
      - name: original_id_in_source
        description: "Original identifier from the Ecosphere source system (ESDL: original_id_in_source)"
      - name: ean_code
        description: "European Article Number - unique grid connection identifier (18 digits) (ESDL: ean_code)"
      - name: contract_power
        description: "Contracted maximum capacity in kW (ESDL: contract_power)"
      - name: asset_type
        description: "Meter model/type (ESDL: asset_type)"
      - name: manufacturer
        description: "Meter manufacturer (ESDL: manufacturer)"
      - name: owner
        description: "Grid operator or owner (ESDL: owner)"
      - name: state
        description: "Asset state (OPERATIONAL, PLANNED, DISABLED) (ESDL: AssetStateEnum)"
        tests:
          - accepted_values:
              values: ['OPERATIONAL', 'PLANNED', 'DISABLED', 'REMOVED']
      - name: surface_area
        description: "Installation surface area in m² (ESDL: surface_area)"
      - name: commissioning_date
        description: "Date the connection was commissioned (ESDL: commissioning_date)"
      - name: decommissioning_date
        description: "Date the connection was or will be decommissioned (ESDL: decommissioning_date)"
      - name: installation_duration
        description: "Installation duration in days (ESDL: installation_duration)"
      - name: technical_lifetime
        description: "Expected technical lifetime in years (ESDL: technical_lifetime)"
      - name: aggregated
        description: "Whether this record is an aggregation (ESDL: aggregated)"
      - name: aggregation_count
        description: "Number of connections aggregated (ESDL: aggregation_count)"

