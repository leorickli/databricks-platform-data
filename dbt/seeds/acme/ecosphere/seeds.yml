  - name: ecosphere_batteries
    description: |
      ESDL-aligned dimension seed for Battery objects in the Ecosphere pipeline.
      Represents electrical energy storage systems (BESS) installed at Ecosphere buildings.
      Attributes describe storage capacity, charge/discharge rates, efficiency, and lifecycle characteristics.
      Joins with fact table: ecosphere_batch_battery (State of Charge telemetry).
    config:
      schema: gold
      database: "{{ var('acme_catalog', 'acme_dev') }}"
      column_types:
        id: string
        original_id_in_source: string
        capacity: double
        max_charge_rate: double
        max_discharge_rate: double
        charge_efficiency: double
        discharge_efficiency: double
        self_discharge_rate: double
        fill_level: double
        max_charge_discharge_cycles: int
        power_factor: double
        installation_duration: double
        technical_lifetime: double
        surface_area: int
        aggregated: boolean
        aggregation_count: int
    columns:
      - name: id
        description: "Unique identifier for the battery system (ESDL: id)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Human-readable battery system name (ESDL: name)"
        tests:
          - not_null
      - name: description
        description: "Extended description of the battery system (ESDL: description)"
      - name: short_name
        description: "Short name or code (ESDL: short_name)"
      - name: original_id_in_source
        description: "Original identifier from the Ecosphere source system (ESDL: original_id_in_source)"
      - name: asset_type
        description: "Battery technology type (e.g., Li-Ion BESS) (ESDL: asset_type)"
      - name: manufacturer
        description: "Battery manufacturer (ESDL: manufacturer)"
      - name: owner
        description: "Owner of the battery system (ESDL: owner)"
      - name: state
        description: "Asset state (OPERATIONAL, PLANNED, DISABLED) (ESDL: AssetStateEnum)"
        tests:
          - accepted_values:
              values: ['OPERATIONAL', 'PLANNED', 'DISABLED', 'REMOVED']
      - name: capacity
        description: "Usable storage capacity in kWh (ESDL: capacity)"
      - name: max_charge_rate
        description: "Maximum charging power in Watts (ESDL: max_charge_rate)"
      - name: max_discharge_rate
        description: "Maximum discharging power in Watts (ESDL: max_discharge_rate)"
      - name: charge_efficiency
        description: "Round-trip charge efficiency ratio 0-1 (ESDL: charge_efficiency)"
      - name: discharge_efficiency
        description: "Round-trip discharge efficiency ratio 0-1 (ESDL: discharge_efficiency)"
      - name: self_discharge_rate
        description: "Self-discharge rate in J/s or Watts (ESDL: self_discharge_rate)"
      - name: fill_level
        description: "Initial state of charge as ratio 0-1 (ESDL: fill_level)"
      - name: max_charge_discharge_cycles
        description: "Rated maximum number of charge/discharge cycles (ESDL: max_charge_discharge_cycles)"
      - name: power_factor
        description: "Power factor of the battery inverter (ESDL: power_factor)"
      - name: commissioning_date
        description: "Date the battery was commissioned (ESDL: commissioning_date)"
      - name: decommissioning_date
        description: "Date the battery was or will be decommissioned (ESDL: decommissioning_date)"
      - name: installation_duration
        description: "Installation duration in days (ESDL: installation_duration)"
      - name: technical_lifetime
        description: "Expected technical lifetime in years (ESDL: technical_lifetime)"
      - name: surface_area
        description: "Installation footprint in m² (ESDL: surface_area)"
      - name: aggregated
        description: "Whether this record represents an aggregated battery system (ESDL: aggregated)"
      - name: aggregation_count
        description: "Number of battery units aggregated (ESDL: aggregation_count)"

  - name: ecosphere_ev_charging_stations
    description: |
      ESDL-aligned dimension seed for EVChargingStation objects in the Ecosphere pipeline.
      Represents electric vehicle charging stations installed at Ecosphere buildings.
      Attributes describe power capacity, connector count, efficiency, and operational characteristics.
      Joins with fact table: ecosphere_batch_ev_charging_station (socket status telemetry).
    config:
      schema: gold
      database: "{{ var('acme_catalog', 'acme_dev') }}"
      column_types:
        id: string
        original_id_in_source: string
        power: double
        power_factor: double
        full_load_hours: int
        operational_hours: int
        number_of_connectors: int
        efficiency: double
        installation_duration: double
        technical_lifetime: double
        surface_area: int
        aggregated: boolean
        aggregation_count: int
    columns:
      - name: id
        description: "Unique identifier for the EV charging station (ESDL: id)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Human-readable charging station name (ESDL: name)"
        tests:
          - not_null
      - name: description
        description: "Extended description (ESDL: description)"
      - name: short_name
        description: "Short name or code (ESDL: short_name)"
      - name: original_id_in_source
        description: "Original identifier from the Ecosphere source system (ESDL: original_id_in_source)"
      - name: asset_type
        description: "Charger type (e.g., AC Charger, DC Fast Charger) (ESDL: asset_type)"
      - name: manufacturer
        description: "Charger manufacturer (ESDL: manufacturer)"
      - name: owner
        description: "Owner of the charging station (ESDL: owner)"
      - name: state
